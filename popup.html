<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>PromptForge</title>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-logo" aria-hidden="true">
        <svg width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="forgeGrad" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
              <stop stop-color="#FFC24A"/>
              <stop offset="0.5" stop-color="#FF6F3C"/>
              <stop offset="1" stop-color="#F4436E"/>
            </linearGradient>
          </defs>
          <rect x="1.5" y="1.5" width="29" height="29" rx="8.5" fill="url(#forgeGrad)"/>
          <path d="M16 5.6 L23.4 16 L16 26.4 L8.6 16 Z" fill="#fff"/>
          <path d="M8.6 16 H23.4" stroke="#FF6F3C" stroke-width="0.9"/>
        </svg>
      </span>
      <span class="brand-name">Forge</span>
    </div>
    <div class="header-actions">
      <button id="historyBtn" class="icon-btn" title="History" aria-label="History">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7.5V12l3 1.8"/></svg>
      </button>
      <button id="settingsBtn" class="icon-btn" title="Settings" aria-label="Settings">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13a1.65 1.65 0 0 0 .33 1.82l.05.05a2 2 0 1 1-2.83 2.83l-.05-.05a1.65 1.65 0 0 0-2.82 1.17V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 7 19.4a1.65 1.65 0 0 0-1.82.33l-.05.05a2 2 0 1 1-2.83-2.83l.05-.05A1.65 1.65 0 0 0 2.6 14H2.5a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.05-.05a2 2 0 1 1 2.83-2.83l.05.05A1.65 1.65 0 0 0 9 4.6h.09A1.65 1.65 0 0 0 10.5 3.09V3a2 2 0 0 1 4 0v.09A1.65 1.65 0 0 0 17 4.6a1.65 1.65 0 0 0 1.82-.33l.05-.05a2 2 0 1 1 2.83 2.83l-.05.05A1.65 1.65 0 0 0 21.4 9v.09A1.65 1.65 0 0 0 22.91 10.5H23a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>
  </header>

  <!-- ============ FORGE VIEW ============ -->
  <main id="forgeView" class="view">
    <p class="tagline">Dump a rough idea. Watch it get forged: decoded, structured, and refined into the prompt you should've written.</p>

    <div class="input-wrap">
      <textarea id="raw" rows="5"
        placeholder="Dump your thoughts here - type it however. Messy is fine, that's the point."></textarea>
    </div>

    <div class="persona">
      <span class="persona-label">Who structures it</span>
      <div class="seg" id="personaSeg" role="tablist">
        <button type="button" class="seg-btn active" data-persona="prompt_engineer" data-recommended title="Clean natural-language prompt - best for most tasks">Prompt Engineer</button>
        <button type="button" class="seg-btn" data-persona="context_engineer" title="Structured Role/Context/Task/Constraints sections - for complex or reusable prompts">Context Engineer</button>
        <button type="button" class="seg-btn" data-persona="json_prompter" title="Prompt as a JSON object - when code or a template consumes it">JSON Prompter</button>
      </div>
      <div id="personaHint" class="persona-hint"></div>
      <div id="personaSuggest" class="persona-suggest" hidden></div>
    </div>

    <div id="contextBar" class="context-bar" hidden>
      <label class="ctx-toggle">
        <input id="useContext" type="checkbox" checked />
        <span>Personalize with your saved context</span>
      </label>
      <button id="editContextBtn" class="ctx-edit" type="button">Edit</button>
    </div>

    <button id="forgeBtn" type="button" class="primary-btn">Forge prompt</button>
    <button id="keyBtn" type="button" class="secondary-btn">Enter Anthropic key</button>

    <div id="status" class="status" hidden></div>

    <div id="understood" class="understood" hidden>
      <div class="understood-head">
        <span class="understood-label">Understood intent <span class="understood-hint">(edit if it's off)</span></span>
        <button id="reintentBtn" class="ghost-btn" type="button" title="Re-structure from this edited intent (skips decode)">Re-forge ↻</button>
      </div>
      <textarea id="understoodText" class="understood-text" rows="3" spellcheck="false"></textarea>
    </div>

    <div id="convergence" class="convergence" hidden></div>

    <div id="output" class="output" hidden>
      <div class="output-head">
        <span id="outputLabel" class="output-label">Engineered prompt</span>
        <div class="output-actions">
          <button id="copyBtn" class="copy-btn">Copy</button>
          <button id="redoBtn" class="ghost-btn" title="Refine again">↻</button>
        </div>
      </div>
      <div id="scoreBreakdown" class="score-breakdown" hidden></div>
      <div id="outputText" class="output-text"></div>
      <div id="sendRow" class="send-row">
        <span class="send-label">Open in</span>
        <button type="button" class="send-btn" data-target="chatgpt">ChatGPT</button>
        <button type="button" class="send-btn" data-target="claude">Claude</button>
        <button type="button" class="send-btn" data-target="gemini">Gemini</button>
      </div>
      <div id="changeSummary" class="change-summary" hidden></div>
    </div>
  </main>

  <!-- ============ SETTINGS VIEW ============ -->
  <section id="settingsView" class="view" hidden>
    <div class="form">
      <label class="field">
        <span class="field-label">Anthropic API key</span>
        <input id="apiKey" type="password" placeholder="sk-ant-..." autocomplete="off" spellcheck="false" />
        <span class="hint">Stored locally in this browser only. Get a key at
          <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>.
        </span>
      </label>

      <label class="field">
        <span class="field-label">Model</span>
        <select id="model">
          <option value="claude-sonnet-4-6">Sonnet 4.6 - balanced (recommended)</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5 - fastest, cheapest</option>
          <option value="claude-opus-4-8">Opus 4.8 - highest quality</option>
        </select>
      </label>

      <label class="field">
        <span class="field-label">Your context (optional)</span>
        <textarea id="userContext" rows="3" placeholder="Who you are, your product/project, your audience, recurring constraints - reused to tailor every prompt."></textarea>
        <span class="hint">Saved locally. Woven into each forge to tailor role, tone, and terminology. Toggle it off per prompt on the main screen.</span>
      </label>

      <button id="saveSettingsBtn" type="button" class="primary-btn">Save settings</button>
      <div id="settingsStatus" class="status" hidden></div>
      <button id="backBtn" type="button" class="link-btn">← Back</button>
    </div>
  </section>

  <!-- ============ HISTORY VIEW ============ -->
  <section id="historyView" class="view" hidden>
    <div class="history-head">
      <span class="view-title">History</span>
      <button id="clearHistoryBtn" class="link-btn">Clear all</button>
    </div>
    <div id="historyList" class="history-list"></div>
    <button id="historyBackBtn" type="button" class="link-btn">← Back</button>
  </section>

  <script src="engine.js"></script>
  <script src="popup.js"></script>
</body>
</html>
